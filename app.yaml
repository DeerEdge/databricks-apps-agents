# Databricks App spec (Free Edition). On deploy, Databricks runs:
#   npm install  →  npm run build (next build)  →  npm run start (next start).
# `next start` binds 0.0.0.0:$PORT automatically from the injected PORT — do not hardcode a port.
#
# SECRETS NEVER GO HERE. The Databricks PAT and the Lakebase identity email are set as
# app secrets / app-environment values at deploy time (see DEPLOY.md), never committed —
# this file lives in a PUBLIC repo (hackathon Rule 4.3(d)). The values below are non-secret
# infra identifiers that are useless without the token.
command:
  - npm
  - run
  - start

env:
  - name: NODE_ENV
    value: production

  # --- non-secret workspace infra ---
  - name: DATABRICKS_HOST
    value: https://dbc-837977ce-19e0.cloud.databricks.com
  - name: DATABRICKS_WAREHOUSE_ID
    value: 6c9078480dee0864
  # Maya referral agent → Mosaic AI Model Serving endpoint 'maya' (gpt-5-mini, tool-calling).
  # Non-secret URL; authenticated with DATABRICKS_TOKEN (bearer) at call time.
  - name: MOSAIC_AI_ENDPOINT
    value: https://dbc-837977ce-19e0.cloud.databricks.com/serving-endpoints/maya/invocations

  # --- non-secret Lakebase infra ---
  - name: LAKEBASE_INSTANCE
    value: meddesert
  - name: LAKEBASE_HOST
    value: ep-late-smoke-d8kfur2q.database.us-east-2.cloud.databricks.com
  - name: LAKEBASE_DATABASE
    value: databricks_postgres

  # --- secrets: PAT + Lakebase identity, from app secret resources (never inline) ---
  # Resource keys map to scope meddesert: token, lakebase-user (see DEPLOY.md / apps update --json).
  - name: DATABRICKS_TOKEN
    valueFrom: meddesert-token
  # LAKEBASE_USER must match the PAT's identity (the email that owns the token).
  - name: LAKEBASE_USER
    valueFrom: meddesert-lakebase-user

  # --- Cerebras inference (qualitative facility analysis) ---
  # Model name is non-secret; the API key comes from app secret resource meddesert-cerebras-api-key
  # (scope meddesert / key cerebras-api-key — set out of band, never inline).
  - name: CEREBRAS_MODEL
    value: gpt-oss-120b
  - name: CEREBRAS_API_KEY
    valueFrom: meddesert-cerebras-api-key
